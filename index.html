<!DOCTYPE html>
<html>

<head>
    <title>Amazon Seller Scraper</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
        }

        input {
            padding: 6px;
            width: 250px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #f4f4f4;
        }

        a {
            color: blue;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h2>Amazon Seller Lead Scraper</h2>

    <input id="keyword" placeholder="Enter product name" />
    <button onclick="search()">Search</button>

    <table>

        <thead>
            <tr>
                <th>Product</th>
                <th>Seller</th>
                <th>Business</th>
                <th>Fulfillment</th>
                <th>Address</th>
                <th>Postcode</th>
                <th>Rating</th>
                <th>Total Ratings</th>
                <th>Seller Page</th>
            </tr>
        </thead>

        <tbody id="results"></tbody>

    </table>

    <script>

        async function search() {

            const keyword = document.getElementById("keyword").value;

            if (!keyword) {
                alert("Enter a keyword");
                return;
            }

            const res = await fetch(`http://localhost:5000/api/scrape?keyword=${keyword}`);

            const data = await res.json();

            console.log(data);

            const table = document.getElementById("results");

            table.innerHTML = "";

            data.forEach(item => {

                table.innerHTML += `
        <tr>

        <td>
        <a href="${item.productUrl}" target="_blank">
        View Product
        </a>
        </td>

        <td>${item.sellerName || "-"}</td>

        <td>${item.businessName || "-"}</td>

        <td>${item.fulfillment || "-"}</td>

        <td>${item.address || "-"}</td>

        <td>${item.postcode || "-"}</td>

        <td>${item.ratingPercentage || "-"}</td>

        <td>${item.totalRatings || "-"}</td>

        <td>
        <a href="${item.pageUrl}" target="_blank">
        Seller Page
        </a>
        </td>

        </tr>
        `;

            });

        }

    </script>

</body>

</html>
